apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db
  namespace: default
  labels:
    app: auth-db
spec:
  replicas: 1  # Database should have only 1 replica
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
      - name: postgres
        image: postgres:18.3
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: auth-service-config

        # Postgres-specific environment variable
        env:
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"  # Subpath to avoid permission issues
        - name: TZ
          value: "UTC"

        # Volume mount for persistent storage
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

        # Resource limits
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

        # Readiness probe: Check if PostgreSQL is ready
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U authuser -d authdb
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        # Liveness probe: Check if PostgreSQL is alive
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U authuser -d authdb
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      # Volume definition
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-data

      restartPolicy: Always
