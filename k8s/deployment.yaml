apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
  labels:
    app: auth-service
spec:
  # Number of pod replicas (1 for local dev, increase for production)
  replicas: 1

  # How to identify which pods belong to this deployment
  selector:
    matchLabels:
      app: auth-service

  # Pod template
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      # Init container: Wait for database to be ready
      initContainers:
      - name: wait-for-db
        image: busybox:1.36

        # Get DB connection details from ConfigMap
        envFrom:
        - configMapRef:
            name: auth-service-config

        command:
        - sh
        - -c
        - |
          echo "Waiting for database to be ready..."
          echo "Checking ${DATABASE_HOST}:${DATABASE_PORT}..."
          until nc -z ${DATABASE_HOST} ${DATABASE_PORT}; do
            echo "Database not ready yet, sleeping..."
            sleep 2
          done
          echo "Database is ready!"

      containers:
      - name: auth-service
        # Replace with your actual image name after building
        # Example: your-registry/auth-service:v1.0.0
        image: auth-service:latest
        imagePullPolicy: IfNotPresent

        # Container port (must match PORT in ConfigMap)
        # This is the ONLY place in this file to change the port number
        ports:
        - containerPort: 8080  # Must match ConfigMap PORT value
          name: http
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: auth-service-config

        # Health check: Kubernetes uses this to know if app is ready
        # Uses your /v1/health endpoint
        livenessProbe:
          httpGet:
            path: /v1/health
            port: http  # References named port above
          initialDelaySeconds: 10  # Wait 10s after container starts
          periodSeconds: 10         # Check every 10s
          timeoutSeconds: 5         # 5s timeout for response
          failureThreshold: 3       # Restart after 3 failures

        # Readiness check: When pod is ready to receive traffic
        readinessProbe:
          httpGet:
            path: /v1/health
            port: http  # References named port above
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        # Resource limits and requests
        resources:
          requests:
            memory: "64Mi"    # Minimum memory guaranteed
            cpu: "100m"       # Minimum CPU (0.1 cores)
          limits:
            memory: "128Mi"   # Maximum memory allowed
            cpu: "200m"       # Maximum CPU (0.2 cores)

        # Security context (run as non-root)
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true

      # Restart policy
      restartPolicy: Always
